<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Vaishnavi ♡</title>
    <style>
        /* --- STYLING (Red Text Requirements) --- */
        
        /* Font & Base Styles */
        :root {
            /* Using SF Pro Display with fallbacks for non-Apple devices */
            --font-main: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --primary-color: #2c3e50;
            --heart-color: #ff4b72;
            --paper-color: #fdfaf6;
            --poppy: #000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: #ffe6eb;
            color: var(--primary-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Falling Hearts Background */
        #hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0; /* Behind everything */
            overflow: hidden;
        }

        .heart {
            position: absolute;
            top: -10%;
            color: var(--heart-color);
            font-size: 1.5rem;
            opacity: 0.6;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* --- STRUCTURE (Blue Lines Requirements) --- */
        
        .content-wrapper {
            position: relative;
            z-index: 1; /* Above hearts */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 40px 20px;
        }

        /* Intro Section */
        .intro {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--primary-color);
            letter-spacing: 1px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: 400;
        }

        .start-btn {
            background: transparent;
            box-shadow: 2px 2px var(--primary-color);
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 10px 30px 13px 30px;
            font-size: 30px;
            font-family: var(--font-main);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .start-btn:hover {
            background: var(--primary-color);
            color: white;
        }

        /* Spiral Notebook */
        .notebook-container {
            display: none; /* Hidden until "Start Here" is clicked */
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            perspective: 1000px;
            animation: fadeIn 1s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .notebook {
            display: flex;
            background: #d4c4b7; /* Book cover border color */
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        /* Paper Texture */
        .page {
            background-color: var(--paper-color);
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png'); /* Subtle paper texture */
            flex: 1;
            padding: 30px;
            min-height: 450px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .page.left {
            border-radius: 10px 0 0 10px;
            box-shadow: inset -5px 0 10px rgba(0,0,0,0.05);
        }

        .page.right {
            border-radius: 0 10px 10px 0;
            box-shadow: inset 5px 0 10px rgba(0,0,0,0.05);
        }

        /* Spiral Binding */
        .binding {
            /* margin-left: 10px; */
            /* margin-right: 10px; */
            /* width: 40px; */
            /* background: linear-gradient(to right, #e0e0e0, #ffffff, #e0e0e0); */
            background: transparent;
            border-radius: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            /* align-items: center; */
            border-left: 1px solid #FFE6EB;
            border-right: 1px solid #FFE6EB;
        }

        .ring {
            width: 10px;
            height: 10px;
            background: linear-gradient(to bottom, #999, #eee, #999);
            border-radius: 5px;
            /* box-shadow: 0 4px rgba(0,0,0,0.3); */
            border: 1px solid #413939;
        }

        /* Page Content Styles */
        .page-title {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }

        .photo-box {
            flex: 1;
            border: 2px dashed #aaa;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
            padding: 10px;
        }

        .photo-box img {
            width: 280px;
            height: 140px;
            object-fit: cover;
            border-radius: 4px;
        }

        .shayari-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 1.2rem;
            line-height: 2;
            padding: 20px;
            font-style: italic;
            /* Lined paper effect */
            background-image: repeating-linear-gradient(transparent, transparent 31px, #a0c4ff 31px, #a0c4ff 32px);
            background-position: 0 1.2rem;
        }

        /* Turn Page Button (Bottom Right) */
        .turn-page-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #fff;
            border: 2px solid var(--primary-color);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: var(--font-main);
            color: var(--primary-color);
            transition: all 0.2s;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .turn-page-btn:hover {
            background: var(--primary-color);
            color: #fff;
            transform: translateY(-2px);
        }

        /* Responsive behavior */
        @media (max-width: 768px) {
            .notebook {
                flex-direction: column;
            }
            .page { min-height: 300px; border-radius: 10px !important; }
            .binding { width: 100%; height: 30px; flex-direction: row; }
            .ring { width: 10px; height: 30px; background: linear-gradient(to right, #999, #eee, #999); }
            .turn-page-btn { bottom: 10px; right: 10px; }
        }
    </style>
</head>
<body>

    <div id="hearts-container"></div>

    <div class="content-wrapper">
        <div class="intro">
            <h1><span style="color:#ff4b72">♡</span> Hey, Vaishnavi <span style="color:#ff4b72">♡</span></h1>
            <p>Ye website meri sab feelings ka<br>chhota sa ghar hai...<br>Sirf tumhare liye</p>
            <button class="start-btn" onclick="openNotebook()">Start Here!</button>
        </div>

        <div class="notebook-container" id="notebook-container">
            <div class="notebook">
                <div class="page left">
                    <h2 class="page-title">Memories</h2>
                    <div class="photo-box">
                        <img id="memory-photo" src="https://cache.careers360.mobi/media/article_images/2024/4/12/git-jaipur-b-tech-m-tech-admissions-2024-featured-image_.jpg" alt="Memory Photo">
                    </div>
                </div>

                <div class="binding">
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                </div>

                <div class="page right">
                    <h2 class="page-title">Shayari</h2>
                    <div class="shayari-box" id="shayari-text">
                        Kuch is tarah se tum meri zindagi mein aayi...<br>
                        Jaise andhere mein roshni muskurayi.
                    </div>
                    <button class="turn-page-btn" onclick="turnPage()">Turn<br>Page ➡️</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Falling Hearts Generator ---
        const heartsContainer = document.getElementById('hearts-container');
        const heartCount = 35; // Adjust amount of hearts

        for (let i = 0; i < heartCount; i++) {
            let heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '♡'; // Or use '❤️'
            
            // Randomize position, size, and animation duration
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 1.5 + 0.5) + 'rem';
            heart.style.animationDuration = (Math.random() * 5 + 4) + 's';
            heart.style.animationDelay = (Math.random() * 5) + 's';
            
            heartsContainer.appendChild(heart);
        }

        // --- 2. Open Notebook Logic ---
        function openNotebook() {
            const notebook = document.getElementById('notebook-container');
            notebook.style.display = 'block';
            
            // Smooth scroll down to the notebook
            notebook.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // --- 3. Page Turning Logic ---
        // Data for the 5 pages
        const pagesData = [
            {
                photo: "https://picsum.photos/seed/love1/400/400", // Placeholder (Change URL to actual images if you want)
                text: "Kuch is tarah se tum meri zindagi mein aayi...<br>Jaise andhere mein roshni muskurayi."
            },
            {
                photo: "https://picsum.photos/seed/love2/400/400",
                text: "Har pal, har lamha bas tumhara hi khayal hai...<br>Mera dil tumhare bina ab behaal hai."
            },
            {
                photo: "https://picsum.photos/seed/love3/400/400",
                text: "Tumhari ek muskaan pe main sab kuch haar dun...<br>Apni sari umar tumhare naam kar dun."
            },
            {
                photo: "https://picsum.photos/seed/love4/400/400",
                text: "Khuda ne fursat mein tumhe banaya hoga...<br>Aur mere naseeb se tumhe milaya hoga."
            },
            {
                photo: "https://picsum.photos/seed/love5/400/400",
                text: "Tum meri pehli aur aakhiri mohabbat ho.<br><br>I Love You, Vaishnavi! ❤️"
            }
        ];

        let currentPageIndex = 0;
        const photoElement = document.getElementById('memory-photo');
        const shayariElement = document.getElementById('shayari-text');

        function turnPage() {
            // Increment page index, loop back to start if at the end
            currentPageIndex++;
            if (currentPageIndex >= pagesData.length) {
                currentPageIndex = 0; // Loops back to the first page
            }

            // Simple fade effect for transition
            photoElement.style.opacity = 0;
            shayariElement.style.opacity = 0;

            setTimeout(() => {
                // Update content
                photoElement.src = pagesData[currentPageIndex].photo;
                shayariElement.innerHTML = pagesData[currentPageIndex].text;

                // Change button text on last page
                const btn = document.querySelector('.turn-page-btn');
                if (currentPageIndex === pagesData.length - 1) {
    btn.innerHTML = "Read<br>Again ↺";
    
    // Remove the old click listener (if applicable) and add the redirect
    btn.onclick = () => {
        window.location.href = "secondpage.html";
    };
                } else {
                    btn.innerHTML = "Turn<br>Page ➡️";
                }

                // Fade back in
                photoElement.style.transition = "opacity 0.5s ease";
                shayariElement.style.transition = "opacity 0.5s ease";
                photoElement.style.opacity = 1;
                shayariElement.style.opacity = 1;
            }, 300); // Wait 300ms for the fade out to finish
        }
    </script>
</body>
</html>
