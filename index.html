<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Vaishnavi ♡</title>
    <style>
        /* --- STYLING --- */
        :root {
            --font-main: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --primary-color: #2c3e50;
            --heart-color: #ff4b72;
            --paper-color: #fdfaf6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: #ffe6eb;
            color: var(--primary-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Falling Hearts Background */
        #hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            top: -10%;
            color: var(--heart-color);
            font-size: 1.5rem;
            opacity: 0.6;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .content-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 40px 20px;
        }

        /* Intro Section */
        .intro {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--primary-color);
            letter-spacing: 1px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: 400;
        }

        .start-btn {
            background: transparent;
            box-shadow: 2px 2px var(--primary-color);
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 10px 30px 13px 30px;
            font-size: 30px;
            font-family: var(--font-main);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .start-btn:hover {
            background: var(--primary-color);
            color: white;
        }

        /* Spiral Notebook */
        .notebook-container {
            display: none;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            perspective: 1000px;
            animation: fadeIn 1s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .notebook {
            display: flex;
            background: #d4c4b7;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .page {
            background-color: var(--paper-color);
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            flex: 1;
            padding: 30px;
            min-height: 450px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .page.left { border-radius: 10px 0 0 10px; box-shadow: inset -5px 0 10px rgba(0,0,0,0.05); }
        .page.right { border-radius: 0 10px 10px 0; box-shadow: inset 5px 0 10px rgba(0,0,0,0.05); }

        .binding {
            background: transparent;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            padding: 0 5px;
            border-left: 1px solid #FFE6EB;
            border-right: 1px solid #FFE6EB;
        }

        .ring {
            width: 12px;
            height: 12px;
            background: linear-gradient(to bottom, #999, #eee, #999);
            border-radius: 50%;
            border: 1px solid #413939;
        }

        .page-title {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }

        .photo-box {
            flex: 1;
            border: 2px dashed #aaa;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
            padding: 10px;
        }

        .photo-box img {
            width: 100%;
            max-width: 280px;
            height: 270px;
            object-fit: cover;
            border-radius: 4px;
            transition: opacity 0.5s ease;
        }

        .shayari-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 1.2rem;
            line-height: 2;
            padding: 20px;
            font-style: italic;
            transition: opacity 0.5s ease;
            background-image: repeating-linear-gradient(transparent, transparent 31px, #a0c4ff 31px, #a0c4ff 32px);
            background-position: 0 1.2rem;
        }

        .turn-page-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #fff;
            border: 2px solid var(--primary-color);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: var(--font-main);
            color: var(--primary-color);
            transition: all 0.2s;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .turn-page-btn:hover {
            background: var(--primary-color);
            color: #fff;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .notebook { flex-direction: column; }
            .page { min-height: 300px; border-radius: 10px !important; }
            .binding { width: 100%; height: 30px; flex-direction: row; padding: 5px 0; }
            .ring { width: 12px; height: 12px; }
        }
    </style>
</head>
<body>

    <div id="hearts-container"></div>

    <div class="content-wrapper">
        <div class="intro">
            <h1><span style="color:#ff4b72">♡</span> Hey, Vaishnavi <span style="color:#ff4b72">♡</span></h1>
            <p>Ye website meri sab feelings ka<br>chhota sa ghar hai...<br>Sirf tumhare liye</p>
            <button class="start-btn" onclick="openNotebook()">Start Here!</button>
        </div>

        <div class="notebook-container" id="notebook-container">
            <div class="notebook">
                <div class="page left">
                    <div class="photo-box">
                        <img id="memory-photo" src="naitik-coder/1.jpeg" alt="Memory Photo">
                    </div>
                </div>

                <div class="binding">
                    <div class="ring"></div><div class="ring"></div><div class="ring"></div>
                    <div class="ring"></div><div class="ring"></div><div class="ring"></div>
                    <div class="ring"></div><div class="ring"></div><div class="ring"></div>
                </div>

                <div class="page right">
                    <h2 class="page-title">Shayari</h2>
                    <div class="shayari-box" id="shayari-text">
                        Kuch is tarah se tum meri zindagi mein aayi...<br>
                        Jaise andhere mein roshni muskurayi.
                    </div>
                    <button class="turn-page-btn" onclick="turnPage()">Turn<br>Page ➡️</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Falling Hearts Generator ---
        const heartsContainer = document.getElementById('hearts-container');
        const heartCount = 35;

        for (let i = 0; i < heartCount; i++) {
            let heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '♡';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 1.5 + 0.5) + 'rem';
            heart.style.animationDuration = (Math.random() * 5 + 4) + 's';
            heart.style.animationDelay = (Math.random() * 5) + 's';
            heartsContainer.appendChild(heart);
        }

        // --- 2. Open Notebook Logic ---
        function openNotebook() {
            const notebook = document.getElementById('notebook-container');
            notebook.style.display = 'block';
            notebook.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // --- 3. Page Turning Logic ---
        const pagesData = [
            {
                photo: "naitik-coder/1.jpeg",
                text: "Kuch is tarah se tum meri zindagi mein aayi...<br>Jaise andhere mein roshni muskurayi."
            },
            {
                photo: "naitik-coder/2.jpeg",
                text: "Har pal, har lamha bas tumhara hi khayal hai...<br>Mera dil tumhare bina ab behaal hai."
            },
            {
                photo: "naitik-coder/3.jpeg",
                text: "Tumhari ek muskaan pe main sab kuch haar dun...<br>Apni sari umar tumhare naam kar dun."
            },
            {
                photo: "naitik-coder/4.jpeg",
                text: "Khuda ne fursat mein tumhe banaya hoga...<br>Aur mere naseeb se tumhe milaya hoga."
            },
            {
                photo: "naitik-coder/5.jpeg",
                text: "Tum meri pehli aur aakhiri mohabbat ho.<br><br>I Love You, Vaishnavi! ❤️"
            }
        ];

        let currentPageIndex = 0;
        const photoElement = document.getElementById('memory-photo');
        const shayariElement = document.getElementById('shayari-text');
        const btn = document.querySelector('.turn-page-btn');

        function turnPage() {
            // Check if we are already at the last page
            if (currentPageIndex === pagesData.length - 1) {
                window.location.href = "secondpage.html";
                return;
            }

            currentPageIndex++;

            // Transition out
            photoElement.style.opacity = 0;
            shayariElement.style.opacity = 0;

            setTimeout(() => {
                // Update content
                photoElement.src = pagesData[currentPageIndex].photo;
                shayariElement.innerHTML = pagesData[currentPageIndex].text;

                // Update button text on last page
                if (currentPageIndex === pagesData.length - 1) {
                    btn.innerHTML = "Next<br>Page ▶";
                }

                // Transition in
                photoElement.style.opacity = 1;
                shayariElement.style.opacity = 1;
            }, 300);
        }
    </script>
</body>
</html>
