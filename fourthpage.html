<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary Janu!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #fff5f7;
            overflow: hidden;
        }

        .cursive { font-family: 'Dancing Script', cursive; }

        /* Floating Hearts Animation */
        .heart {
            position: absolute;
            color: #ff4d6d;
            animation: float 6s infinite linear;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* The CSS Cake */
        .cake {
            position: relative;
            width: 250px;
            height: 200px;
            margin: 0 auto;
        }
        .plate {
            width: 300px;
            height: 15px;
            background: #d1d5db;
            border-radius: 10px;
            position: absolute;
            bottom: -10px;
            left: -25px;
        }
        .layer {
            position: absolute;
            width: 250px;
            border-radius: 10px 10px 0 0;
        }
        .layer-bottom { height: 80px; background: #f08080; bottom: 0; }
        .layer-top { height: 60px; background: #ffb6c1; bottom: 80px; width: 200px; left: 25px; }
        .icing {
            height: 20px;
            background: #ffffff;
            width: 100%;
            border-radius: 10px 10px 0 0;
            position: absolute;
            top: 0;
        }
        .candle {
            width: 12px;
            height: 40px;
            background: repeating-linear-gradient(45deg, #fff, #fff 5px, #ff4d6d 5px, #ff4d6d 10px);
            position: absolute;
            top: -20px;
            left: 119px;
        }
        .flame {
            width: 15px;
            height: 25px;
            background: #ffca3a;
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -25px;
            left: -2px;
            animation: flicker 0.1s infinite alternate;
            box-shadow: 0 0 10px #ffca3a;
        }
        @keyframes flicker {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* Transitions */
        .hidden-section { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="hearts-container"></div>

    <div id="start-page" class="text-center z-10 px-4">
        <h1 class="text-6xl text-pink-600 cursive mb-8">Hello Janu...</h1>
        <p class="mb-8 text-gray-600">I have a surprise, but you must prove your love first!</p>
        <button onclick="startGame()" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-10 rounded-full shadow-lg transform transition hover:scale-105">
            Start the Challenge
        </button>
    </div>

    <div id="quiz-page" class="hidden-section bg-white p-8 rounded-3xl shadow-2xl z-10 w-full max-w-md mx-4 text-center">
        <div id="question-container">
            <span id="q-number" class="text-pink-400 font-bold uppercase tracking-widest text-sm">Question 1</span>
            <h2 id="q-text" class="text-2xl font-semibold text-gray-800 mt-2 mb-6">Loading question...</h2>
            <input type="text" id="answer-input" class="w-full border-2 border-pink-100 rounded-xl p-3 focus:border-pink-400 outline-none transition mb-4" placeholder="Your answer here...">
            <button onclick="checkAnswer()" class="w-full bg-pink-500 text-white font-bold py-3 rounded-xl hover:bg-pink-600 transition">
                Submit Answer
            </button>
        </div>
    </div>

    <div id="reveal-page" class="hidden-section text-center z-10">
        <div class="cake mb-16">
            <div class="candle"><div class="flame"></div></div>
            <div class="layer layer-top"><div class="icing"></div></div>
            <div class="layer layer-bottom"><div class="icing"></div></div>
            <div class="plate"></div>
        </div>
        <h1 class="text-6xl text-red-600 cursive mb-4 drop-shadow-sm">Happy Anniversary Janu</h1>
        <p class="text-pink-500 text-xl italic">You got all 3 right! I love you so much. ❤️</p>
    </div>

    <script>
        const questions = [
            { q: "What is the date of our anniversary?", a: "25 february" }, // Change these to your real answers
            { q: "What is my favorite nickname for you?", a: "bebu" },
            { q: "what is my favorite colour?", a: "blue" }
        ];

        let currentStep = 0;

        // 1. Create Floating Hearts
        function createHearts() {
            const container = document.getElementById('hearts-container');
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDelay = Math.random() * 5 + 's';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                container.appendChild(heart);
            }
        }
        createHearts();

        // 2. Navigation Logic
        function startGame() {
            document.getElementById('start-page').classList.add('hidden-section');
            document.getElementById('quiz-page').classList.remove('hidden-section');
            loadQuestion();
        }

        function loadQuestion() {
            document.getElementById('q-number').innerText = `Question ${currentStep + 1} of 3`;
            document.getElementById('q-text').innerText = questions[currentStep].q;
            document.getElementById('answer-input').value = '';
        }

        function checkAnswer() {
            const userAns = document.getElementById('answer-input').value.toLowerCase().trim();
            if (userAns === questions[currentStep].a.toLowerCase()) {
                currentStep++;
                if (currentStep < 3) {
                    loadQuestion();
                } else {
                    showFinalReveal();
                }
            } else {
                alert("Wrong answer! Think again, my love... ❤️");
            }
        }

        function showFinalReveal() {
            document.getElementById('quiz-page').classList.add('hidden-section');
            document.getElementById('reveal-page').classList.remove('hidden-section');
            
            // Trigger Confetti
            var duration = 15 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
              return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
              var timeLeft = animationEnd - Date.now();
              if (timeLeft <= 0) return clearInterval(interval);
              var particleCount = 50 * (timeLeft / duration);
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
</body>
</html>
